  description: 
    Designers shouldn't have to wait for developers to see their ideas in browsers. Developers shouldn't have to rebuild the same landing page components fifty times. 
    OP2 was my answer to both problems—a desktop app that turns visual mocks into functional code in seconds. 
    It's rough around the edges, but the concept worked.

