  name: Reti Blog
  date: Dec 2024
  technologies:
    - Next.js 14
    - Supabase
    - Tailwind CSS
    - shadcn/ui
  description: 
    Most blogging platforms are overbuilt or underpowered. I built Reti Blog to find the middle ground—fast, focused on writing, with just enough features to matter. 
    Real-time analytics, actual dark mode (not just color inversion), and a comment system that doesn't feel like 2010. 
    It's the blog I wanted to use, so I built it.

- project:
    name: SeedSafer
    logo:
    url: https://github.com/RetiFier/seedsafer
  name: SeedSafer
  date: Mar 2023
  technologies:
    - React Native
    - TypeScript
    - Ethereum API
    - Web3.js
  description: 
    Everyone tells you to write down your seed phrase on paper and hide it. That's terrible advice if you actually use crypto. 
    SeedSafer exists because I needed a way to store recovery phrases that didn't feel like gambling with my life savings. 
    The challenge wasn't encryption—it was building something non-technical users would actually trust.

